<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock %}</title>

    <!-- Tailwind CDN (dark UI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { colors: { brand: { DEFAULT: "#38bdf8" } } } },
      };
    </script>
  </head>
  <body class="h-full bg-slate-900 text-slate-100">
    <header class="border-b border-slate-800 bg-slate-900/60">
      <div class="mx-auto max-w-5xl px-4 py-4">
        <a href="{{url_for('index')}}">
          <span class="text-xl font-bold tracking-tight">
            <span class="text-brand">The</span>Ved<span
              class="text-slate-400"
              >Application</span
            ><span class="text-white">.com</span>
          </span>
        </a>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-8">

      {% with messages = get_flashed_messages(with_categories=true)%}

          {% if messages %}
             <div class="space-y-2 mb-4 ">
              {% for category,message in messages %}
                <div class=" text-center rounded px-4 py-3 text-sm
                {% if category == 'success' %}
                bg-emerald-500/10 text-emerald-300 border border-emerald-400/20
                
                {% elif category=='error' %}

                bg-rose-500/10 tet-rose-300 border border-rose-400/20
         
                {% else %}

                bg-slate-800 text-slate-200 border border-slate-700

                {% endif %}

                "
                >{{message}}</div>
              {% endfor %}
             </div>
          {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <footer
      class="mx-auto max-w-5xl px-4 pb-8 text-xs text-slate-500 text-center"
    >
      Built with Flask, SQLite, Flask-Login & Tailwind
    </footer>
  </body>
</html>
