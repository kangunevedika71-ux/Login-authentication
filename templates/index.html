{% extends "base.html" %} {% block title %}Home Page{% endblock %}
{% block content %}
<h1 class="text-3xl font-semibold mb-2">Welcome</h1>
<p class="text-slate-400">
  Build registration, login, a protected dashboard, and logout — clean and
  minimal.
</p>

<div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
  <a
    class="rounded-2xl border border-slate-800 bg-slate-900 p-4 hover:bg-slate-800/50"
    href="/register"
  >
    <h2 class="font-semibold">Register</h2>
    <p class="text-sm text-slate-400">Create a new account</p>
  </a>
  <a
    class="rounded-2xl border border-slate-800 bg-slate-900 p-4 hover:bg-slate-800/50"
    href="/login"
  >
    <h2 class="font-semibold">Login</h2>
    <p class="text-sm text-slate-400">Access your dashboard</p>
  </a>
</div>
{% endblock %}
